name = hardSubReader
summary = "HardSub Reader"
description = """Reads hardcoded (burned-in) video subtitles, also known as hardsubs, aloud in real time using the high-accuracy Windows 11 OneOCR engine, with automatic fallback to legacy Windows OCR. Press NVDA+alt+s to toggle. Configure in NVDA Settings, HardSub Reader category. Requires system Python with the oneocr package (see documentation)."""
